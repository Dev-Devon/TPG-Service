<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Video Compressor</title>
<link rel="icon" type="image/x-icon" href="favicon_1.ico">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- quick fix for compressor specific styles since css file is shared -->
<style>
.file-zone { border: 1.5px dashed var(--card-border); border-radius: var(--radius-xs); padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; margin-bottom: 22px; background: rgba(0,0,0,0.1); }
.file-zone:hover { border-color: var(--accent); background: rgba(0,223,162,0.02); }
.file-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.file-icon { font-size: 1.5rem; color: var(--muted); margin-bottom: 8px; transition: all 0.3s; }
.file-zone:hover .file-icon { color: var(--accent); transform: translateY(-2px); }
.file-text { font-size: 0.85rem; color: var(--fg-dim); }
.file-text span { color: var(--accent); font-weight: 600; }
.file-hint { font-size: 0.73rem; color: var(--muted); margin-top: 4px; }

.select-wrapper { position: relative; margin-bottom: 22px; }
.select-wrapper::after { content: "\f107"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; pointer-events: none; }
.styled-select { width: 100%; padding: 13px 40px 13px 18px; border-radius: var(--radius-xs); border: 1px solid var(--card-border); background: rgba(0,0,0,0.3); color: var(--fg); font-size: 0.88rem; font-family: inherit; appearance: none; -webkit-appearance: none; cursor: pointer; transition: all 0.3s ease; }
.styled-select option { background: var(--bg-elevated); color: var(--fg); }

.progress-wrap { margin-top: 24px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-label { font-size: 0.72rem; font-weight: 600; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.1em; }
.progress-percent { font-size: 0.82rem; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.progress-track { width: 100%; height: 8px; border-radius: 4px; background: rgba(0,0,0,0.4); overflow: hidden; position: relative; }
.progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-secondary)); width: 0%; transition: width 0.4s ease; position: relative; }
.log-wrap { margin-top: 22px; }
.log-container { background: rgba(0,0,0,0.45); border: 1px solid var(--card-border); border-radius: var(--radius-sm); overflow: hidden; }
.log-header { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--card-border); background: rgba(16,18,26,0.6); font-size: 0.72rem; font-weight: 600; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.1em; }
.terminal-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
#log { padding: 16px; max-height: 220px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; line-height: 1.7; color: var(--fg-dim); word-break: break-all; }
.error { color: var(--error); }
.success { color: var(--success); }
.info { color: var(--info); }

#prog { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }

/* manual positioning tweaks for this page */
.orb-1-fix { top: -80px; right: -80px; width: 420px; height: 420px; background: radial-gradient(circle, rgba(0,223,162,0.07) 0%, transparent 70%); animation: orbDrift1 16s ease-in-out infinite; }
.orb-2-fix { bottom: 5%; left: -120px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(0,180,216,0.05) 0%, transparent 70%); animation: orbDrift2 20s ease-in-out infinite; }
</style>
</head>

<body>

<div class="content-wrapper">
  <div class="orb orb-1-fix"></div>
  <div class="orb orb-2-fix"></div>

  <div class="page-top">
    <a class="back-btn" href="index.html"><i class="fas fa-arrow-left"></i> Back</a>
    <nav class="mini-nav">
      <a href="convert.html"><i class="fas fa-sliders-h"></i>EQ Studio</a>
      <a href="downloader.html"><i class="fas fa-download"></i>Downloader</a>
      <a href="vidcom.html" class="active"><i class="fas fa-film"></i>Compressor</a>
      <a href="base64.html"><i class="fa fa-image"></i>Base64</a>
    </nav>
  </div>

  <section class="page-hero">
    <h1>Video <span class="grad">Compressor</span></h1>
    <h4>TPG Service v3</h4>
    <p class="sub">Smart compression with HDR detection and hardware acceleration.</p>
  </section>

  <div class="tool-content">
    <div class="glass-card">
      <div class="section-title">
        <i class="fas fa-compress-arrows-alt"></i>
        Compress
        <span class="title-line"></span>
      </div>

      <div class="file-zone" id="fileZone">
        <input type="file" id="videoFile" accept="video/*">
        <div class="file-icon"><i class="fas fa-film"></i></div>
        <div class="file-text">Drop a <span>video file</span> here</div>
        <div class="file-hint">Supports all common video formats</div>
      </div>

      <label class="field-label">Quality Target (CRF — lower = better quality)</label>
      <div class="select-wrapper">
        <select id="crf" class="styled-select">
          <option value="32">Low — smallest file</option>
          <option value="28" selected>Medium — recommended</option>
          <option value="24">High — better quality</option>
          <option value="21">Very High</option>
          <option value="18">Best / Lossless</option>
        </select>
      </div>

      <button id="btn" class="btn-primary" disabled>
        <i class="fas fa-compress-arrows-alt"></i>
        Compress Video
      </button>

      <progress id="prog" value="0" max="100"></progress>

      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-label">Processing</span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="log-wrap">
        <div class="log-container">
          <div class="log-header">
            <span class="terminal-dot"></span>
            Output
          </div>
          <div id="log">Ready. Choose a video file…</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 <span>TPG Service</span>. All rights reserved.
  </footer>
</div>

<script>
// sync logic
var prog = document.getElementById('prog');
var progressFill = document.getElementById('progressFill');
var progressPercent = document.getElementById('progressPercent');

// copied this from stackoverflow, handles the weird way browsers animate progress
var desc = Object.getOwnPropertyDescriptor(HTMLProgressElement.prototype, 'value');
if (desc && desc.set) {
  var oldSet = desc.set;
  Object.defineProperty(prog, 'value', {
    set: function(v) {
      oldSet.call(this, v);
      var pct = Math.round(v);
      progressFill.style.width = pct + '%';
      progressPercent.textContent = pct + '%';
    },
    get: function() {
      return parseFloat(this.getAttribute('value')) || 0;
    }
  });
}

var fileZone = document.getElementById('fileZone');
var fileEl = document.getElementById('videoFile');
var crfEl = document.getElementById('crf');
var btn = document.getElementById('btn');
var log = document.getElementById('log');

// visual feedback
fileEl.addEventListener('change', function() {
  if (fileEl.files.length > 0) {
    var name = fileEl.files[0].name;
    fileZone.querySelector('.file-text').innerHTML = 'Loaded: <span>' + name + '</span>';
    fileZone.querySelector('.file-hint').textContent = (fileEl.files[0].size/1048576).toFixed(1) + ' MB — ready';
    fileZone.style.borderColor = 'var(--accent)';
    fileZone.style.background = 'rgba(0,223,162,0.03)';
  }
});

// logic handler (overwrites above event listener? no, this is separate logic)
fileEl.onchange = function() { 
    btn.disabled = !fileEl.files[0]; 
    if(fileEl.files[0]) {
        log.innerHTML = ''; // clear log
        log.innerHTML += 'Selected: ' + fileEl.files[0].name + ' (' + (fileEl.files[0].size/1048576).toFixed(1) + ' MB)';
    }
};

btn.onclick = async function() {
    var file = fileEl.files[0];
    if(!file) return;
    
    btn.disabled = true;
    prog.value = 0;
    log.innerHTML = '';

    // fake visual start
    log.innerHTML += '<br>Analyzing and Uploading...';
    prog.value = 10;

    var form = new FormData();
    form.append('video', file);
    form.append('crf', crfEl.value);

    try {
        // timeout hack just in case server hangs
        var controller = new AbortController();
        var id = setTimeout(() => controller.abort(), 60000); 

        var resp = await fetch('bin/compress.php', { 
            method:'POST', 
            body:form,
            signal: controller.signal
        });
        clearTimeout(id);

        var text = await resp.text();
        
        prog.value = 80;

        // basic check for success, might fail if php output changes slightly
        if (resp.status !== 200 || text.indexOf('SUCCESS') === -1) {
            log.innerHTML += '<br><span class="error">Server Error:</span><br>' + text;
            prog.value = 0;
            btn.disabled = false;
            return;
        }

        // parse response format: KEY=VAL
        var lines = text.split('\n');
        var data = {};
        for(var i=0; i<lines.length; i++) {
            var l = lines[i];
            var eq = l.indexOf('=');
            if(eq > 0) {
                data[l.substr(0, eq).trim()] = l.substr(eq+1).trim();
            }
        }

        if(data.size && data.url) {
            log.innerHTML += '<br><span class="success">Done! Size: ' + (data.size/1048576).toFixed(1) + ' MB</span>';
            log.innerHTML += '<br>Saved to: ' + data.url;
            prog.value = 100;
        } else {
             log.innerHTML += '<br><span class="error">Invalid response format.</span>';
             prog.value = 0;
        }

    } catch(err) {
        log.innerHTML += '<br><span class="error">Network Error: ' + err.message + '</span>';
        prog.value = 0;
    } finally {
        btn.disabled = false;
    }
};
</script>
</body>
</html>
